apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rdas-hpa
  namespace: rdas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rdas
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70