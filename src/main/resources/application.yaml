server:
    port: 8080
spring:
    application:
        name: rdas
    cache:
        type: caffeine
        caffeine:
        spec: maximumSize=10000,expireAfterWrite=86400s   # 24 h default

rdas:
    soap:
        wsdl-url: http://webservices.oorsprong.org/websamples.countryinfo/CountryInfoService.wso?WSDL
        connect-timeout-ms: 5000
        read-timeout-ms: 10000
    cache:
        country-ttl-hours: 24
        currency-ttl-hours: 24
        language-ttl-hours: 24
        continent-ttl-hours: 72
    bootstrap:
        enabled: true
        refresh-cron: "0 0 2 * * *"    # daily at 02:00

resilience4j:
    circuitbreaker:
        instances:
            soapGateway:
                slidingWindowSize: 10
                minimumNumberOfCalls: 5
                failureRateThreshold: 50
                waitDurationInOpenState: 30s
                permittedNumberOfCallsInHalfOpenState: 3
                automaticTransitionFromOpenToHalfOpenEnabled: true
    retry:
        instances:
            soapGateway:
                maxAttempts: 3
                waitDuration: 2s
                retryExceptions:
                    - com.loopdfs.rdas.exceptions.SoapGatewayException

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,circuitbreakers
    endpoint:
        health:
            show-details: always

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html
logging:
    level:
        com.loopdfs.rdas: DEBUG
        org.springframework.ws: WARN